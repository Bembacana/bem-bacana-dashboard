name: Processar Planilhas

on:
  repository_dispatch:
    types: [processar-planilhas]
  workflow_dispatch:   # permite disparar manualmente pela UI do GitHub

jobs:
  processar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar pasta dados/ se necessária
        run: mkdir -p dados

      - name: Processar planilhas e gravar no Supabase
        run: python scripts/processar_supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Resultado
        if: success()
        run: echo "✅ Processamento concluído em $(date '+%d/%m/%Y %H:%M UTC')"

      - name: Erro
        if: failure()
        run: echo "❌ Falha no processamento. Verifique os logs acima."
